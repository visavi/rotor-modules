name: Update Registry

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Release modules and publish registry.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          MODULES="[]"

          for file in $(find . -maxdepth 2 -name 'module.php' | sort); do
            MODULE=$(basename $(dirname "$file"))
            CONTENT=$(cat "$file")

            get() { echo "$CONTENT" | grep -oP "'$1'\s*=>\s*'\K[^']+"; }

            VERSION=$(get version)
            [ -z "$VERSION" ] && continue

            TAG="$MODULE-$VERSION"
            ASSET="$MODULE.zip"

            if ! gh release view "$TAG" &>/dev/null; then
              echo "[$MODULE] Creating release $TAG"
              zip -r "/tmp/$ASSET" "$MODULE" -x "*.git*"
              gh release create "$TAG" \
                "/tmp/$ASSET#$ASSET" \
                --title "$MODULE $VERSION" \
                --notes "Module: **$MODULE**, Version: **$VERSION**"
            else
              echo "[$MODULE] Release $TAG already exists"
            fi

            ENTRY=$(jq -n \
              --arg module   "$MODULE" \
              --arg name     "$(get name)" \
              --arg desc     "$(get description)" \
              --arg version  "$VERSION" \
              --arg author   "$(get author)" \
              --arg email    "$(get email)" \
              --arg homepage "$(get homepage)" \
              --arg requires "$(get requires)" \
              --arg url      "https://github.com/$REPO/releases/download/$TAG/$ASSET" \
              '{module:$module,name:$name,description:$desc,version:$version,
                author:$author,email:$email,homepage:$homepage,requires:$requires,download_url:$url}')

            MODULES=$(echo "$MODULES" | jq ". + [$ENTRY]")
          done

          echo '{"name":"Official Rotor Modules","modules":[]}' \
            | jq --argjson m "$MODULES" '.modules = $m' > registry.json

          echo "Generated registry.json with $(echo "$MODULES" | jq length) modules"

      - name: Publish registry.json as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete registry --yes 2>/dev/null || true
          gh release create registry registry.json \
            --title "Registry" \
            --notes "Auto-generated module registry" \
            --latest=false
