name: Update Registry

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Release modules and publish registry.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Load existing registry to preserve version history
          MODULES="[]"
          if gh release view registry &>/dev/null; then
            gh release download registry -p "registry.json" -D /tmp/ 2>/dev/null || true
            if [ -f /tmp/registry.json ]; then
              MODULES=$(cat /tmp/registry.json | jq '.modules // []')
            fi
          fi

          for file in $(find . -maxdepth 2 -name 'module.php' | sort); do
            MODULE=$(basename $(dirname "$file"))
            CONTENT=$(cat "$file")

            get() { echo "$CONTENT" | grep -oP "'$1'\s*=>\s*'\K[^']+"; }

            VERSION=$(get version)
            [ -z "$VERSION" ] && continue

            TAG="$MODULE-$VERSION"
            ASSET="$MODULE.zip"

            if ! gh release view "$TAG" &>/dev/null; then
              echo "[$MODULE] Creating release $TAG"
              zip -r "/tmp/$ASSET" "$MODULE" -x "*.git*"
              gh release create "$TAG" \
                "/tmp/$ASSET#$ASSET" \
                --title "$MODULE $VERSION" \
                --notes "Module: **$MODULE**, Version: **$VERSION**"
            else
              echo "[$MODULE] Release $TAG already exists"
            fi

            VERSION_ENTRY=$(jq -n \
              --arg version  "$VERSION" \
              --arg requires "$(get requires)" \
              --arg url      "https://github.com/$REPO/releases/download/$TAG/$ASSET" \
              '{version:$version,requires:$requires,download_url:$url}')

            # Add or update module entry preserving all versions
            MODULES=$(echo "$MODULES" | jq \
              --arg mod      "$MODULE" \
              --arg name     "$(get name)" \
              --arg desc     "$(get description)" \
              --arg author   "$(get author)" \
              --arg email    "$(get email)" \
              --arg homepage "$(get homepage)" \
              --argjson ver  "$VERSION_ENTRY" \
              '
              if any(.[]; .module == $mod) then
                map(
                  if .module == $mod then
                    {
                      module:      $mod,
                      name:        $name,
                      description: $desc,
                      author:      $author,
                      email:       $email,
                      homepage:    $homepage,
                      versions: (
                        [(.versions // [])[] | select(.version != $ver.version)] + [$ver]
                        | sort_by(.version)
                        | reverse
                      )
                    }
                  else . end
                )
              else
                . + [{
                  module:      $mod,
                  name:        $name,
                  description: $desc,
                  author:      $author,
                  email:       $email,
                  homepage:    $homepage,
                  versions:    [$ver]
                }]
              end
              ')
          done

          echo '{"name":"Official Rotor Modules","modules":[]}' \
            | jq --argjson m "$MODULES" '.modules = $m' > registry.json

          echo "Generated registry.json with $(echo "$MODULES" | jq length) modules"

      - name: Publish registry.json as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete registry --yes 2>/dev/null || true
          gh release create registry registry.json \
            --title "Registry" \
            --notes "Auto-generated module registry" \
            --latest=false
